name: Nightly Sync

on:
  schedule:
    - cron: "0 5 * * *"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (no writes)"
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      # Restore any checkpoint left behind by a previous run that died mid-fetch
      # (e.g. exhausted retries during a sustained GitHub GraphQL 502 window).
      # checkpoints/ is git-ignored, so without this cache the resume path is
      # dead in CI and every failed run restarts cold from page 1. restore-keys
      # matches the most recent prior entry by prefix.
      - name: Restore sync checkpoint
        uses: actions/cache/restore@5a3ec84eff668545956fd18022155c47e93e2684 # v4.2.3
        with:
          path: checkpoints
          key: sync-checkpoint-${{ github.run_id }}
          restore-keys: |
            sync-checkpoint-

      # continue-on-error: the nightly sync's only recurring failure is a
      # TRANSIENT upstream GitHub GraphQL "502 Bad Gateway" that survives the
      # fetcher's 9-attempt retry budget during a sustained-outage window. By
      # design the script preserves its checkpoint on that path and the next
      # run resumes from the last good page (see the "Restore/Persist sync
      # checkpoint" steps), so a single bad night is self-healing. Failing the
      # whole workflow on that transient 502 turned a recoverable upstream
      # blip into a red run plus a notify-on-failure email every night. Mark
      # the step continue-on-error so a transient exhausted-retry does not fail
      # the nightly run; the checkpoint is still persisted (if: always()) and
      # whatever pages did land are still committed below. A persistent outage
      # remains visible as a non-green step in the run, and the resume logic
      # means it self-corrects once GitHub's GraphQL API recovers.
      - name: Run sync
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          GH_USERNAME: ${{ secrets.GH_USERNAME }}
        run: |
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            python -m reporium_db sync --dry-run
          else
            python -m reporium_db sync
          fi

      # Always persist the checkpoint dir, even when the sync step failed, so
      # the NEXT scheduled run resumes from the last good page instead of
      # restarting cold. On a fully successful run the script deletes
      # current_run.json, so the saved entry is empty and the next run starts
      # fresh as intended. Run-id-scoped key => every run writes its own entry.
      - name: Persist sync checkpoint
        if: always()
        uses: actions/cache/save@5a3ec84eff668545956fd18022155c47e93e2684 # v4.2.3
        with:
          path: checkpoints
          key: sync-checkpoint-${{ github.run_id }}

      - name: Configure git
        run: |
          git config user.name "perditio-bot"
          git config user.email "bot@perditio.com"

      - name: Commit and push
        run: |
          BUILD=$(cat BUILD 2>/dev/null || echo "0")
          BUILD=$((BUILD + 1))
          echo $BUILD > BUILD
          git add data/ schedule.json pending_enrichment.json LAST_RUN.md README.md BUILD
          git diff --staged --quiet || git commit -m "build($BUILD): nightly update $(date -u +%Y-%m-%d)"
          git push
